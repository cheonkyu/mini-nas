<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up - Mini-NAS Cloud Solutions</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-tint": "#005bc0",
                    "outline-variant": "#c1c6d6",
                    "on-surface-variant": "#414754",
                    "inverse-surface": "#2e3132",
                    "tertiary": "#9e4300",
                    "surface-container": "#eceeef",
                    "surface-bright": "#f8fafb",
                    "primary": "#005bbf",
                    "tertiary-fixed": "#ffdbcb",
                    "surface": "#f8fafb",
                    "secondary-fixed": "#d8e2ff",
                    "secondary-fixed-dim": "#afc7fb",
                    "on-surface": "#191c1d",
                    "secondary-container": "#b2c9fe",
                    "on-tertiary-fixed": "#341100",
                    "on-tertiary-container": "#0e0200",
                    "on-primary": "#ffffff",
                    "primary-fixed-dim": "#adc7ff",
                    "surface-container-high": "#e6e8e9",
                    "primary-fixed": "#d8e2ff",
                    "error": "#ba1a1a",
                    "on-tertiary-fixed-variant": "#783100",
                    "on-error-container": "#93000a",
                    "on-primary-fixed-variant": "#004493",
                    "surface-container-highest": "#e1e3e4",
                    "on-primary-fixed": "#001a41",
                    "outline": "#727785",
                    "on-background": "#191c1d",
                    "background": "#f8fafb",
                    "on-secondary-fixed": "#001a41",
                    "on-secondary-fixed-variant": "#2e4673",
                    "on-secondary-container": "#3d5481",
                    "surface-dim": "#d8dadb",
                    "on-error": "#ffffff",
                    "on-secondary": "#ffffff",
                    "error-container": "#ffdad6",
                    "tertiary-container": "#c55500",
                    "secondary": "#475e8c",
                    "surface-variant": "#e1e3e4",
                    "on-tertiary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-container": "#ffffff",
                    "inverse-on-surface": "#eff1f2",
                    "inverse-primary": "#adc7ff",
                    "tertiary-fixed-dim": "#ffb691",
                    "surface-container-low": "#f2f4f5",
                    "primary-container": "#1a73e8"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafb;
        }
        .headline-font {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 bg-[#f8fafb]/80 dark:bg-[#191c1d]/80 backdrop-blur-md shadow-[0px_12px_32px_rgba(25,28,29,0.04)]">
<div class="flex justify-between items-center px-8 h-16 w-full max-w-none">
<div class="flex items-center gap-2">
<span class="text-xl font-bold tracking-tight text-[#191c1d] dark:text-[#f8fafb] headline-font">Mini-NAS</span>
</div>
<div class="flex items-center gap-6">
<button class="material-symbols-outlined text-[#191c1d] dark:text-[#f8fafb] hover:bg-[#f2f4f5] dark:hover:bg-[#e1e3e4]/10 transition-colors duration-200 p-2 rounded-full">help</button>
<button class="material-symbols-outlined text-[#191c1d] dark:text-[#f8fafb] hover:bg-[#f2f4f5] dark:hover:bg-[#e1e3e4]/10 transition-colors duration-200 p-2 rounded-full">settings</button>
</div>
</div>
</nav>
<!-- Main Content: Registration Canvas -->
<main class="flex-grow flex items-center justify-center pt-24 pb-32 px-4">
<div class="w-full max-w-[480px]">
<!-- Editorial Header Pair -->
<div class="mb-10 text-center md:text-left">
<p class="font-label text-xs uppercase tracking-wider text-primary font-semibold mb-2">Cloud Infrastructure</p>
<h1 class="headline-font text-4xl font-bold text-on-surface tracking-tight">Create your account</h1>
</div>
<!-- Elevated Registration Card -->
<div class="bg-surface-container-lowest p-8 md:p-10 rounded shadow-[0px_12px_32px_rgba(25,28,29,0.04)]">
<form class="space-y-6">
<!-- Full Name -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-on-surface-variant" for="full_name">Full Name</label>
<input class="w-full px-4 py-3 bg-surface-container-highest border border-outline-variant/10 rounded focus:ring-2 focus:ring-primary focus:border-primary focus:bg-surface-container-lowest transition-all duration-200 outline-none text-on-surface" id="full_name" name="full_name" placeholder="John Doe" type="text"/>
</div>
<!-- Email -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-on-surface-variant" for="email">Email Address</label>
<input class="w-full px-4 py-3 bg-surface-container-highest border border-outline-variant/10 rounded focus:ring-2 focus:ring-primary focus:border-primary focus:bg-surface-container-lowest transition-all duration-200 outline-none text-on-surface" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
<!-- Password Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="block text-sm font-medium text-on-surface-variant" for="password">Password</label>
<input class="w-full px-4 py-3 bg-surface-container-highest border border-outline-variant/10 rounded focus:ring-2 focus:ring-primary focus:border-primary focus:bg-surface-container-lowest transition-all duration-200 outline-none text-on-surface" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<div class="space-y-1.5">
<label class="block text-sm font-medium text-on-surface-variant" for="confirm_password">Confirm Password</label>
<input class="w-full px-4 py-3 bg-surface-container-highest border border-outline-variant/10 rounded focus:ring-2 focus:ring-primary focus:border-primary focus:bg-surface-container-lowest transition-all duration-200 outline-none text-on-surface" id="confirm_password" name="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 pt-2">
<div class="flex items-center h-5">
<input class="h-4 w-4 rounded border-outline-variant/20 text-primary focus:ring-primary bg-surface-container-highest" id="terms" name="terms" type="checkbox"/>
</div>
<label class="text-sm text-on-surface-variant leading-tight" for="terms">
                            I agree to the <a class="text-primary hover:underline font-medium" href="#">Terms of Service</a> and <a class="text-primary hover:underline font-medium" href="#">Privacy Policy</a>.
                        </label>
</div>
<!-- CTA Button -->
<div class="pt-4">
<button class="w-full py-3.5 px-4 bg-gradient-to-r from-primary to-primary-container text-on-primary font-semibold rounded shadow-sm hover:brightness-110 active:scale-[0.98] transition-all duration-200" type="submit">
                            Create Account
                        </button>
</div>
</form>
<!-- Login Redirect -->
<div class="mt-8 pt-8 border-t border-surface-container-high text-center">
<p class="text-sm text-on-surface-variant">
                        Already have an account? 
                        <a class="text-primary font-semibold hover:underline ml-1" href="#">Log in</a>
</p>
</div>
</div>
<!-- Trust Indicator -->
<div class="mt-8 flex items-center justify-center gap-6 opacity-40 grayscale pointer-events-none">
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-sm">security</span>
<span class="text-[10px] uppercase font-bold tracking-widest">Enterprise Grade</span>
</div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-sm">verified_user</span>
<span class="text-[10px] uppercase font-bold tracking-widest">ISO 27001</span>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="fixed bottom-0 w-full py-6 bg-transparent">
<div class="flex justify-center gap-8 items-center w-full px-4">
<span class="text-xs font-normal text-[#191c1d]/60 dark:text-[#f8fafb]/60 font-label">© 2024 Mini-NAS Cloud Solutions</span>
<div class="flex gap-6">
<a class="text-xs font-normal text-[#191c1d]/60 dark:text-[#f8fafb]/60 font-label hover:text-[#1A73E8] transition-colors" href="#">Privacy Policy</a>
<a class="text-xs font-normal text-[#191c1d]/60 dark:text-[#f8fafb]/60 font-label hover:text-[#1A73E8] transition-colors" href="#">Terms of Service</a>
<a class="text-xs font-normal text-[#191c1d]/60 dark:text-[#f8fafb]/60 font-label hover:text-[#1A73E8] transition-colors" href="#">Documentation</a>
</div>
</div>
</footer>
</body></html>
